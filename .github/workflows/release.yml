name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  create-release-pr:
    name: "Create release PR"
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump version
        id: bump
        run: |
          ruby -e '
            file = "lib/specbandit/version.rb"
            content = File.read(file)
            current = content.match(/VERSION = .(\d+)\.(\d+)\.(\d+)./)[1..3].map(&:to_i)
            major, minor, patch = current

            case "${{ inputs.bump }}"
            when "major" then major += 1; minor = 0; patch = 0
            when "minor" then minor += 1; patch = 0
            when "patch" then patch += 1
            end

            new_version = "#{major}.#{minor}.#{patch}"
            new_content = content.sub(/VERSION = .\d+\.\d+\.\d+./, "VERSION = \x27#{new_version}\x27")
            File.write(file, new_content)
            puts "Version bumped to #{new_version}"
          '

          NEW_VERSION=$(ruby -r ./lib/specbandit/version -e 'puts Specbandit::VERSION')
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="release/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add lib/specbandit/version.rb
          git commit -m "Release v${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "Release v${VERSION}" \
            --body "Bump version to **v${VERSION}** (\`${{ inputs.bump }}\` release).

          Once CI passes and this PR is merged, the gem will be automatically published to RubyGems and a GitHub Release will be created." \
            --base main \
            --head "$BRANCH"

          echo "### Release PR created for v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
