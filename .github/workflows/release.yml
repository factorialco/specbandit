name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: "Release"
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLISH_TOKEN }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Bump version
        id: bump
        run: |
          ruby -e '
            file = "lib/specbandit/version.rb"
            content = File.read(file)
            current = content.match(/VERSION = .(\d+)\.(\d+)\.(\d+)./)[1..3].map(&:to_i)
            major, minor, patch = current

            case "${{ inputs.bump }}"
            when "major" then major += 1; minor = 0; patch = 0
            when "minor" then minor += 1; patch = 0
            when "patch" then patch += 1
            end

            new_version = "#{major}.#{minor}.#{patch}"
            new_content = content.sub(/VERSION = .\d+\.\d+\.\d+./, "VERSION = \x27#{new_version}\x27")
            File.write(file, new_content)
            puts "Version bumped to #{new_version}"
          '

          NEW_VERSION=$(ruby -r ./lib/specbandit/version -e 'puts Specbandit::VERSION')
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update Gemfile.lock
        run: bundle install

      - name: Commit and push version bump
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/specbandit/version.rb Gemfile.lock
          git commit -m "Release v${VERSION}"
          git push origin main

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes

      - name: Summary
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          {
            echo "## Released v${VERSION}"
            echo ""
            echo "- [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/v${VERSION})"
            echo "- RubyGems publish will be handled by trusted publishers"
          } >> "$GITHUB_STEP_SUMMARY"
