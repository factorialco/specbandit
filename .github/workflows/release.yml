name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: "Release"
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Bump version
        id: bump
        run: |
          ruby -e '
            file = "lib/specbandit/version.rb"
            content = File.read(file)
            current = content.match(/VERSION = .(\d+)\.(\d+)\.(\d+)./)[1..3].map(&:to_i)
            major, minor, patch = current

            case "${{ inputs.bump }}"
            when "major" then major += 1; minor = 0; patch = 0
            when "minor" then minor += 1; patch = 0
            when "patch" then patch += 1
            end

            new_version = "#{major}.#{minor}.#{patch}"
            new_content = content.sub(/VERSION = .\d+\.\d+\.\d+./, "VERSION = \x27#{new_version}\x27")
            File.write(file, new_content)
            puts "Version bumped to #{new_version}"
          '

          NEW_VERSION=$(ruby -r ./lib/specbandit/version -e 'puts Specbandit::VERSION')
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "### Version bumped to v${NEW_VERSION}" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/specbandit/version.rb
          git commit -m "Release v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --tags

      - name: Build gem
        run: gem build specbandit.gemspec

      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: gem push specbandit-${{ steps.bump.outputs.version }}.gem

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "v${{ steps.bump.outputs.version }}"
          --title "v${{ steps.bump.outputs.version }}"
          --generate-notes
