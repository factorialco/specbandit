name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dogfood:
    name: "Dogfood: specbandit runs its own specs"
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Push unit specs to Redis queue
        run: |
          bundle exec specbandit push \
            --key "dogfood-${{ github.run_id }}" \
            --pattern 'spec/specbandit/**/*_spec.rb'

      - name: Run 3 concurrent workers (work-stealing)
        run: |
          KEY="dogfood-${{ github.run_id }}"

          bundle exec specbandit work --key "$KEY" --key-rerun "${KEY}-w1" --batch-size 1 > worker-1.log 2>&1 &
          PID1=$!
          bundle exec specbandit work --key "$KEY" --key-rerun "${KEY}-w2" --batch-size 1 > worker-2.log 2>&1 &
          PID2=$!
          bundle exec specbandit work --key "$KEY" --key-rerun "${KEY}-w3" --batch-size 1 > worker-3.log 2>&1 &
          PID3=$!

          FAIL=0
          wait $PID1 || FAIL=1
          wait $PID2 || FAIL=1
          wait $PID3 || FAIL=1

          echo "========== Worker 1 =========="
          cat worker-1.log
          echo ""
          echo "========== Worker 2 =========="
          cat worker-2.log
          echo ""
          echo "========== Worker 3 =========="
          cat worker-3.log
          echo ""

          # Generate job summary
          {
            echo "## Dogfood Results"
            echo ""
            echo "3 workers competed for specs via \`specbandit work\` (work-stealing from a shared Redis queue)."
            echo ""
            echo "| Worker | Files | Status |"
            echo "|--------|-------|--------|"
            for i in 1 2 3; do
              FILES=$(grep "^  spec/" "worker-${i}.log" | sed 's/^  //' | tr '\n' ', ' | sed 's/,$//')
              if grep -q "SOME FAILED\|FAILED" "worker-${i}.log"; then
                STATUS="Failed"
              elif grep -q "Nothing to do" "worker-${i}.log"; then
                STATUS="Idle (queue was empty)"
              else
                STATUS="Passed"
              fi
              echo "| Worker ${i} | \`${FILES:-none}\` | ${STATUS} |"
            done
            echo ""
            echo "<details><summary>Full worker logs</summary>"
            echo ""
            for i in 1 2 3; do
              echo "### Worker ${i}"
              echo ""
              echo '```'
              cat "worker-${i}.log"
              echo '```'
              echo ""
            done
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

          exit $FAIL

  integration-tests:
    name: "Integration tests"
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run integration tests
        run: bundle exec rspec spec/integration/
