name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    name: "Publish to RubyGems"
    runs-on: ubuntu-latest
    # Only run when a "Release v*" commit lands on main (i.e. a release PR was merged)
    if: startsWith(github.event.head_commit.message, 'Release v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Extract version
        id: version
        run: |
          VERSION=$(ruby -r ./lib/specbandit/version -e 'puts Specbandit::VERSION')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Tag release
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Build gem
        run: gem build specbandit.gemspec

      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: gem push specbandit-${{ steps.version.outputs.version }}.gem

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "v${{ steps.version.outputs.version }}"
          --title "v${{ steps.version.outputs.version }}"
          --generate-notes

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## Published v${VERSION}"
            echo ""
            echo "- [RubyGems](https://rubygems.org/gems/specbandit/versions/${VERSION})"
            echo "- [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/v${VERSION})"
          } >> "$GITHUB_STEP_SUMMARY"
